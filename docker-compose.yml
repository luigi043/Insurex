version: "3.8"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: insurex-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: InsureX.Api/Dockerfile
    container_name: insurex-api
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=IAPR_Data;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True

  frontend:
    build:
      context: ./InsureX.Frontend
      dockerfile: Dockerfile
    container_name: insurex-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:5000/api

volumes:
  mssql-data:
